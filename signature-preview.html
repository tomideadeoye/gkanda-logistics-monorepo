<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK&A Email Signature Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 40px; background-color: #f5f5f5; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        .copy-btn { background: #003366; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; font-weight: 600; }
        .copy-btn:hover { background: #004488; }
        .preview-area { border: 1px dashed #ccc; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <button class="copy-btn" onclick="copySignature()">Copy Signature for Zoho</button>
        <div class="preview-area" id="signature">
            <div style="font-family: 'Inter', sans-serif; color: #1a1a1a; line-height: 1.5;">
              <table cellpadding="0" cellspacing="0" border="0" style="width: 100%; max-width: 500px;">
                <tr>
                  <td style="vertical-align: top; padding-right: 20px; border-right: 2px solid #003366;">
                    <!-- CROPPED LOGO - Transparent & Sharp -->
                    <img src="https://gkaports.com/gkaassets/gka-logo-cropped.png" alt="GK&A Logistics Logo" width="120" style="display: block; width: 120px; height: auto;">
                  </td>
                  <td style="vertical-align: top; padding-left: 20px;">
                    <p style="margin: 0; font-size: 18px; font-weight: 700; color: #003366;">Omobola Litan Abiru</p>
                    <p style="margin: 2px 0 10px 0; font-size: 14px; color: #666; font-style: italic;">Managing Director</p>
                    
                    <p style="margin: 10px 0 0 0; font-size: 12px; font-weight: 600; color: #003366; text-transform: uppercase; letter-spacing: 0.5px;">GK&A Logistics Services Limited</p>
                    <p style="margin: 0; font-size: 11px; color: #444;">GK&A Terminal Harbour Limited</p>
                    <p style="margin: 0 0 10px 0; font-size: 11px; color: #444;">GK&A Port Infrastructure PTE. LTD.</p>
                    
                    <div style="font-size: 13px; color: #333;">
                      <p style="margin: 2px 0;">📞 +234 810 862 7165</p>
                      <p style="margin: 2px 0;">📞 +234 703 834 1611 (WhatsApp)</p>
                      <p style="margin: 2px 0;">📞 +234 818 408 2911</p>
                      <p style="margin: 2px 0;">📧 <a href="mailto:mobolaabiru@gkaports.com" style="color: #003366; text-decoration: none;">mobolaabiru@gkaports.com</a></p>
                      <p style="margin: 2px 0;">🌐 <a href="https://www.gkaports.com" style="color: #003366; text-decoration: none;">www.gkaports.com</a></p>
                      <p style="margin: 10px 0 0 0; font-size: 12px; color: #888;">📍 Lagos, Nigeria</p>
                    </div>
                  </td>
                </tr>
              </table>
            </div>
        </div>
    </div>

    <script>
        function copySignature() {
            const signature = document.getElementById('signature');
            const range = document.createRange();
            range.selectNode(signature);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            alert('Signature copied to clipboard! You can now paste it into Zoho Mail.');
        }
    </script>
</body>
</html>
