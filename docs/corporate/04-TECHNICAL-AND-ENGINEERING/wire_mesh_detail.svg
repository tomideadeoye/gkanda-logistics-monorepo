<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <title>Wire Mesh Panel Detail</title>
  <desc>Detailed view of wire mesh fence panel with concertina wire</desc>
  
  <style>
    .wire-grid { stroke: #000000; stroke-width: 0.5; fill: none; }
    .post { stroke: #000000; stroke-width: 2; fill: #ffffff; }
    .concrete-base { stroke: #000000; stroke-width: 1; fill: #f0f0f0; }
    .support-bar { stroke: #000000; stroke-width: 3; fill: none; }
    .concertina-wire { stroke: #000000; stroke-width: 1.5; fill: none; }
    .coil { stroke: #000000; stroke-width: 1; fill: none; }
    .barb { stroke: #000000; stroke-width: 0.8; fill: none; }
    .dimension-line { stroke: #000000; stroke-width: 0.5; stroke-dasharray: 2,2; fill: none; }
    .dimension-arrow { fill: #000000; }
    .dimension-label { font: 14px Arial, sans-serif; fill: #000000; }
    .label { font: 12px Arial, sans-serif; fill: #000000; }
    .title { font: 16px Arial, sans-serif; font-weight: bold; fill: #000000; }
  </style>
  
  <!-- Title -->
  <text x="400" y="30" class="title" text-anchor="middle">WIRE MESH FENCE PANEL DETAIL</text>
  
  <!-- Wire Mesh Grid -->
  <!-- Grid parameters -->
  <!-- 2.4m wide x 2.7m high, represented at 400px x 450px -->
  <!-- Aperture spacing: 75mm, represented at ~12.5px -->
  
  <!-- Vertical lines (75mm spacing) -->
  <g id="vertical-wires">
    <!-- 2400mm / 75mm = 32 spaces + 1 line = 33 lines -->
    <!-- Starting at x=150, ending at x=550 -->
    <!-- Spacing: 400px / 32 = 12.5px -->
    <!-- Generate 33 vertical lines -->
    <!-- ... existing code ... -->
  </g>
  
  <!-- Horizontal lines (75mm spacing) -->
  <g id="horizontal-wires">
    <!-- 2700mm / 75mm = 36 spaces + 1 line = 37 lines -->
    <!-- Starting at y=80, ending at y=530 -->
    <!-- Spacing: 450px / 36 = 12.5px -->
    <!-- Generate 37 horizontal lines -->
    <!-- ... existing code ... -->
  </g>
  
  <!-- Left Post -->
  <rect x="140" y="80" width="10" height="450" class="post"/>
  <rect x="120" y="530" width="50" height="50" class="concrete-base"/>
  
  <!-- Right Post -->
  <rect x="550" y="80" width="10" height="450" class="post"/>
  <rect x="530" y="530" width="50" height="50" class="concrete-base"/>
  
  <!-- Horizontal Support Bars -->
  <line x1="140" y1="120" x2="560" y2="120" class="support-bar"/>
  <line x1="140" y1="500" x2="560" y2="500" class="support-bar"/>
  
  <!-- Concertina Wire -->
  <line x1="145" y1="70" x2="555" y2="70" class="concertina-wire"/>
  
  <!-- Concertina Wire Coils -->
  <g id="coils">
    <!-- 20 coils along the 410px length -->
    <!-- Spacing: 410px / 20 = 20.5px -->
    <!-- ... existing code ... -->
  </g>
  
  <!-- Dimension Lines -->
  <!-- Width dimension (2.40m) -->
  <line x1="150" y1="580" x2="550" y2="580" class="dimension-line"/>
  <polygon points="150,575 145,580 150,585" class="dimension-arrow"/>
  <polygon points="550,575 555,580 550,585" class="dimension-arrow"/>
  <text x="350" y="595" class="dimension-label" text-anchor="middle">2.40 m</text>
  
  <!-- Height dimension (2.70m) -->
  <line x1="100" y1="80" x2="100" y2="530" class="dimension-line"/>
  <polygon points="95,80 100,75 105,80" class="dimension-arrow"/>
  <polygon points="95,530 100,535 105,530" class="dimension-arrow"/>
  <text x="80" y="305" class="dimension-label" text-anchor="middle" transform="rotate(-90 80 305)">2.70 m</text>
  
  <!-- Labels -->
  <text x="300" y="100" class="label">4mm Ø Wire Mesh</text>
  <text x="300" y="140" class="label">75mm × 75mm Aperture</text>
  <text x="300" y="495" class="label">75 × 75 × 5mm Post</text>
  <text x="300" y="560" class="label">450 × 450 × 600mm Base</text>
  <text x="300" y="60" class="label">Concertina Wire</text>
</svg>