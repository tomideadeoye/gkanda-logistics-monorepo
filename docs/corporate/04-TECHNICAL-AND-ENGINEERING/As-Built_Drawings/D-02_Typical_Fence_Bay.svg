     y="3300"
     width="3400"
     height="360"
     fill="#fff"
     stroke="#222"
     stroke-width="4"
     id="rect1" />
  <text
     x="140"
     y="3400"
     class="title"
     id="text1">D-02 Typical Fence Bay – Elevation (Not to scale)</text>
  <text
     x="140"
     y="3460"
     class="txt"
     id="text2">Posts: SHS 75×75×5 mm | Bay: 2,400 mm c/c | Mesh: 2,700 mm high, 50×50×4.0 mm</text>
  <text
     x="140"
     y="3520"
     class="txt"
     id="text3">Footing: 450×500×600 mm (C25/30) | Ground clearance: 50 mm | Topping: 600 mm concertina on 45° brackets (300 mm proj.)</text>
  <text
     x="140"
     y="3580"
     class="note"
     id="text4">Finish: Hot-dip galvanized (ISO 1461); optional duplex coating. Anti-tamper SS fixings.</text>
  <!-- Ground line -->
  <line
     x1="100"
     y1="3000"
     x2="3500"
     y2="3000"
     class="line"
     id="line4" />
  <text
