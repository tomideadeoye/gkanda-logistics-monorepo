<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="950" viewBox="0 0 1200 950">
  <title>Site Plan – Perimeter Fence & Gates (NTS)</title>
  <desc>GK &amp; A Logistics – NPA Ikorodu | 257 panels, 288 posts | Approx. perimeter 785 m (rectangle 220 m × 172.5 m)</desc>
  <style>
    .site { fill:#f9fafb; stroke:#cfd8dc; stroke-width:2; }
    .fence { fill:none; stroke:#37474f; stroke-width:4; }
    .gateV { stroke:#d81b60; stroke-width:6; }
    .gateP { stroke:#2e7d32; stroke-width:6; }
    .rod { fill:#8d6e63; stroke:#5d4037; stroke-width:1; }
    .dim { stroke:#1f77b4; stroke-width:1.5; marker-start:url(#arrow); marker-end:url(#arrow); }
    .text { font:14px Arial, sans-serif; fill:#263238; }
    .small { font:12px Arial, sans-serif; fill:#455a64; }
    .tick { stroke:#90a4ae; stroke-width:1; }
    .north { fill:#263238; }
    .legendBox { fill:#ffffff; stroke:#b0bec5; stroke-width:1.5; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="2" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f77b4"/>
    </marker>
  </defs>

  <!-- Working rectangle sized to represent 220 m x 172.5 m at 4 px/m -->
  <!-- Top-left of fence rectangle -->
  <g id="plan" transform="translate(100,120)">
    <!-- Site background -->
    <rect x="0" y="0" width="880" height="690" class="site"/>
    <!-- Fence (perimeter) -->
    <rect x="0" y="0" width="880" height="690" class="fence"/>

    <!-- Corner chainage labels -->
    <text x="-10" y="705" class="small" text-anchor="end">SW Ch 0+000</text>
    <text x="890" y="705" class="small">SE Ch 0+220</text>
    <text x="890" y="-10" class="small">NE Ch 0+392.5</text>
    <text x="-10" y="-10" class="small" text-anchor="end">NW Ch 0+612.5</text>
    <text x="-10" y="720" class="small" text-anchor="end">Return Ch 0+785.0</text>

    <!-- Vehicular gates on South edge (y=690) -->
    <!-- South edge x = 4 px per metre from SW (x=0) -->
    <!-- G1a center at 40 m -->
    <line x1="248.5" y1="690" x2="271.5" y2="690" class="gateV"/>
    <text x="260" y="715" class="small" text-anchor="middle">G1a 5.72 m</text>
    <!-- G1b center at 60 m -->
    <line x1="328.5" y1="690" x2="351.5" y2="690" class="gateV"/>
    <text x="340" y="715" class="small" text-anchor="middle">G1b 5.72 m</text>
    <!-- G3 center at 120 m -->
    <line x1="568.0" y1="690" x2="592.0" y2="690" class="gateV"/>
    <text x="580" y="715" class="small" text-anchor="middle">G3 6.10 m</text>
    <!-- G4 center at 160 m -->
    <line x1="728.0" y1="690" x2="752.0" y2="690" class="gateV"/>
    <text x="740" y="715" class="small" text-anchor="middle">G4 6.10 m</text>
    <!-- G6 center at 180 m -->
    <line x1="808.0" y1="690" x2="832.0" y2="690" class="gateV"/>
    <text x="820" y="715" class="small" text-anchor="middle">G6 6.10 m</text>
    <!-- G5 center at 200 m -->
    <line x1="888.0" y1="690" x2="912.0" y2="690" class="gateV"/>
    <text x="900" y="715" class="small" text-anchor="middle">G5 6.10 m</text>

    <!-- Vehicular gate G2 on East edge (x=880), center mid-height -->
    <line x1="880" y1="440.5" x2="880" y2="489.5" class="gateV"/>
    <text x="905" y="470" class="small">G2 12.19 m</text>

    <!-- Pedestrian gates on North edge (y=0) -->
    <!-- P1 at Ch 0+430 -> 37.5 m from NE toward NW => x = 880 - 150 = 730 -->
    <line x1="727.5" y1="0" x2="732.5" y2="0" class="gateP"/>
    <text x="730" y="-10" class="small" text-anchor="middle">P1 (width tbc)</text>
    <!-- P2 at Ch 0+500 -> 107.5 m from NE => x = 880 - 430 = 450 -->
    <line x1="447.5" y1="0" x2="452.5" y2="0" class="gateP"/>
    <text x="450" y="-10" class="small" text-anchor="middle">P2 (width tbc)</text>
    <!-- P3 at Ch 0+560 -> 167.5 m from NE => x = 880 - 670 = 210 -->
    <line x1="207.5" y1="0" x2="212.5" y2="0" class="gateP"/>
    <text x="210" y="-10" class="small" text-anchor="middle">P3 (width tbc)</text>

    <!-- Earthing rods (≤100 m spacing and at gates) -->
    <!-- Ch 0+100: (x=400, y=690) -->
    <polygon points="400,690 395,700 405,700" class="rod"/>
    <!-- Ch 0+200: (x=800, y=690) -->
    <polygon points="800,690 795,700 805,700" class="rod"/>
    <!-- Ch 0+300: on East edge 80 m up from SE -> (x=880, y=490) -->
    <polygon points="880,490 872,500 888,500" class="rod"/>
    <!-- Ch 0+400: on North edge 7.5 m from NE -> (x=850, y=0) -->
    <polygon points="850,0 845,10 855,10" class="rod"/>
    <!-- Ch 0+500: on North edge 107.5 m from NE -> (x=450, y=0) -->
    <polygon points="450,0 445,10 455,10" class="rod"/>
    <!-- Ch 0+600: on North edge 207.5 m from NE -> (x=50, y=0) -->
    <polygon points="50,0 45,10 55,10" class="rod"/>
    <!-- Ch 0+700: on West edge 87.5 m down from NW -> (x=0, y=350) -->
    <polygon points="0,350  -8,360 8,360" class="rod"/>

    <!-- Chainage dimension arrows (overall sides) -->
    <line x1="0" y1="740" x2="880" y2="740" class="dim"/>
    <text x="440" y="762" class="small" text-anchor="middle">South side ≈ 220 m</text>
    <line x1="930" y1="0" x2="930" y2="690" class="dim"/>
    <text x="955" y="360" class="small">East side ≈ 172.5 m</text>
  </g>

  <!-- North arrow -->
  <g transform="translate(1080,120)">
    <polygon points="0,0 20,40 -20,40" class="north"/>
    <rect x="-3" y="40" width="6" height="40" class="north"/>
    <text x="0" y="95" class="text" text-anchor="middle">N</text>
  </g>

  <!-- Title block -->
  <g transform="translate(760,20)">
    <rect x="0" y="0" width="420" height="90" class="legendBox"/>
    <text x="12" y="25" class="text">D‑01 Site Plan – Fence Alignment &amp; Gates (Sketch, NTS)</text>
    <text x="12" y="47" class="small">Project: GK &amp; A Logistics – NPA Lighter Terminal, Ikorodu</text>
    <text x="12" y="67" class="small">Panels: 257 | Posts: 288 | Perimeter ≈ 785 m | Date: 22 Sep 2025</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100,20)">
    <rect x="0" y="0" width="520" height="110" class="legendBox"/>
    <line x1="15" y1="25" x2="65" y2="25" class="fence"/>
    <text x="80" y="30" class="small">Perimeter fence (mesh + barbed topping)</text>
    <line x1="15" y1="50" x2="65" y2="50" class="gateV"/>
    <text x="80" y="55" class="small">Vehicular gate (sliding): G1a, G1b, G2, G3–G6</text>
    <line x1="15" y1="75" x2="65" y2="75" class="gateP"/>
    <text x="80" y="80" class="small">Pedestrian gate: P1–P3</text>
    <polygon points="40,95 32,105 48,105" class="rod"/>
    <text x="80" y="100" class="small">Earthing rods ≤ 100 m spacing and at gates</text>
  </g>

  <!-- Notes -->
  <g transform="translate(100,840)">
    <text class="small">Notes: This is a not-to-scale schematic for NPA submission. Gate and rod positions are indicative; replace with surveyed coordinates/chainages on the final D‑01.</text>
  </g>
</svg>