<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK & A Logistics - Facility Images and Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
            background-color: #f8f9fa;
        }
        
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .image-card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .image-container {
            height: 200px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .full-width {
            grid-column: span 2;
        }
        
        .full-width .image-container {
            height: 300px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            body {
                padding: 5px;
            }
            
            .image-container {
                height: 150px;
            }
            
            .full-width {
                grid-column: span 1;
            }
            
            .full-width .image-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-card">
            <div class="image-container">
                <img src="../../gkaassets/Screenshot 2025-11-12 at 10.00.58.png" alt="Site conditions and facility layout">
            </div>
        </div>
        
        <div class="image-card">
            <div class="image-container">
                <img src="../../gkaassets/Screenshot 2025-11-12 at 09.59.11.png" alt="Environmental monitoring equipment and procedures">
            </div>
        </div>
        
        <div class="image-card">
            <div class="image-container">
                <img src="../../gkaassets/Screenshot 2025-11-12 at 09.58.59.png" alt="Safety measures and personnel protective equipment">
            </div>
        </div>
        
        <div class="image-card">
            <div class="image-container">
                <img src="../../gkaassets/Screenshot 2025-11-12 at 09.58.38.png" alt="Waste management and spill prevention measures">
            </div>
        </div>
        
        <div class="image-card full-width">
            <div class="image-container">
                <img src="../../gkaassets/Screenshot 2025-11-12 at 16.09.28.png" alt="Additional facility image">
            </div>
        </div>
    </div>
</body>
</html>
